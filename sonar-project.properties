# SonarCloud configuration
# Replace the placeholder values below with your actual SonarCloud project key and organisation slug
sonar.projectKey=YOUR_SONARCLOUD_PROJECT_KEY
sonar.organization=YOUR_SONARCLOUD_ORG

sonar.sources=src
sonar.tests=tests
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=dist/**,node_modules/**,coverage/**
